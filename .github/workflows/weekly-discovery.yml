name: Weekly Source Discovery

on:
  schedule:
    - cron: '0 0 * * 0'  # 每周日 00:00 UTC 运行
  workflow_dispatch:      # 支持手动触发

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Source Discovery
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run horizon-discover --output docs/discovered-sources.md

      - name: Commit discovered sources
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/discovered-sources.md
          git diff --quiet && git diff --staged --quiet || git commit -m "🔍 Weekly source discovery"
          git push
