name: Schedule Probe

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
      timezone: 'Asia/Shanghai'  # Quick probe away from the top of the hour
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Print schedule context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"

      - name: Print timestamps
        env:
          TZ: Asia/Shanghai
        run: |
          echo "utc_now=$(date -u +'%Y-%m-%d %H:%M:%S %Z')"
          echo "shanghai_now=$(date +'%Y-%m-%d %H:%M:%S %Z')"
